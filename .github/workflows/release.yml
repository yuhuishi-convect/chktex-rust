name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/chktex
            use_xwin: false

          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
            binary: target/aarch64-unknown-linux-gnu/release/chktex
            use_xwin: false

          - runner: ubuntu-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
            binary: target/x86_64-pc-windows-msvc/release/chktex.exe
            use_xwin: true

          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64
            binary: target/aarch64-apple-darwin/release/chktex
            use_xwin: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-xwin
        if: matrix.use_xwin
        run: cargo install cargo-xwin --locked --quiet

      - name: Build release binary
        run: |
          if [[ "${{ matrix.use_xwin }}" == "true" ]]; then
            cargo xwin build --release -p chktex-cli --target "${{ matrix.target }}"
          else
            cargo build --release -p chktex-cli --target "${{ matrix.target }}"
          fi

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name=="chktex-cli") | .version')
          fi
          chmod +x tools/package-release.sh
          ARCHIVE=$(./tools/package-release.sh "${{ matrix.binary }}" "chktex-${VERSION}-${{ matrix.target }}")
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: dist/**
